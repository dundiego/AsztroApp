<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AsztroApp</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { --primary-blue: #00008b; --white: #ffffff; }
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 15px; color: #333; }
        h1, h2 { color: var(--primary-blue); }
        .hidden { display: none; }
        .btn-main { background-color: var(--primary-blue); color: var(--white); padding: 12px; border: none; border-radius: 8px; width: 100%; font-size: 16px; margin-top: 10px; cursor: pointer; }
        select, input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f4f4f4; }
    </style>
</head>
<body>

<div id="app">
    <section id="home-view">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1>AsztroApp</h1>
            <button id="btn-to-reg" onclick="showView('reg-view')" aria-label="Új felhasználó hozzáadása" style="font-size: 24px; background:none; border:none;">👤+</button>
        </div>
        
        <label for="user-select">Felhasználó:</label>
        <select id="user-select"></select>

        <label for="date-select">Dátum:</label>
        <input type="date" id="date-select">

        <button class="btn-main" onclick="runQuery()">Küldés</button>
    </section>

    <section id="report-view" class="hidden">
        <h2 id="res-name">Eredmény</h2>
        <input type="date" id="res-date-change" aria-label="Dátum módosítása és új lekérdezés">
        
        <table id="result-table">
            <thead>
                <tr>
                    <th>Bolygó</th>
                    <th>Jegy</th>
                    <th>Hatás</th>
                </tr>
            </thead>
            <tbody id="result-body"></tbody>
        </table>
        <button class="btn-main" style="margin-top:20px;" onclick="showView('home-view')">Vissza</button>
    </section>

    <section id="reg-view" class="hidden">
        <h2>Regisztráció</h2>
        <input type="text" id="reg-name" placeholder="Név (kötelező)">
        <input type="email" id="reg-email" placeholder="E-mail (nem kötelező)">
        
        <div id="reg-planets"></div>
        <button class="btn-main" onclick="submitRegistration()">Mentés</button>
        <button class="btn-main" style="background-color:#ccc; color:#000;" onclick="showView('home-view')">Mégse</button>
    </section>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzjTLiafkYuXfYCY_XQIhCqPoOwC0_yDx0R6IJ1eQe6gBxckVXb1gIFFQpXvDsno9H61A/exec";
// Pontosan ugyanazok a nevek, amiket a Script vár el kulcsként!
const PLANETS = ["Nap", "ASC", "Hold", "Merkúr", "Vénusz", "Mars"];
const ZODIACS = ["Kos", "Bika", "Ikrek", "Rák", "Oroszlán", "Szűz", "Mérleg", "Skorpió", "Nyilas", "Bak", "Vízöntő", "Halak"];

let appData = { users: {}, minDate: "", maxDate: "", actualUser: "" };

window.onload = async () => {
    generateRegFields();
    document.getElementById('date-select').valueAsDate = new Date();
    await loadInitialData();
    
    document.getElementById('res-date-change').addEventListener('change', function() {
        if(confirm("Szeretne új lekérdezést a módosított dátummal?")) {
            document.getElementById('date-select').value = this.value;
            runQuery();
        }
    });
};

function generateRegFields() {
    const cont = document.getElementById('reg-planets');
    cont.innerHTML = "";
    PLANETS.forEach((p, i) => {
        const label = document.createElement('label');
        label.innerText = p + ":";
        const sel = document.createElement('select');
        // Biztonságos ID az index alapján, hogy az ékezet ne zavarjon be a HTML-ben
        sel.id = "planet-field-" + i; 
        ZODIACS.forEach(z => {
            const opt = document.createElement('option');
            opt.value = z;
            opt.text = z;
            sel.appendChild(opt);
        });
        cont.appendChild(label);
        cont.appendChild(sel);
    });
}

async function loadInitialData() {
    try {
        const resp = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'load' }) });
        const res = await resp.json();
        if(res.status === "SUCCESS") {
            appData = res;
            updateHomeUI();
            if(!res.hasUsers) showView('reg-view');
        }
    } catch(e) { console.error("Betöltési hiba"); }
}

function updateHomeUI() {
    const sel = document.getElementById('user-select');
    sel.innerHTML = "";
    for(let id in appData.users) {
        let opt = document.createElement('option');
        opt.value = id;
        opt.text = appData.users[id];
        if(id === appData.defaultUserID) opt.selected = true;
        sel.appendChild(opt);
    }
}

async function runQuery() {
    const uid = document.getElementById('user-select').value;
    const dateVal = document.getElementById('date-select').value;
    if(!uid || !dateVal) return alert("Válassz felhasználót és dátumot!");

    try {
        const resp = await fetch(SCRIPT_URL, { 
            method: 'POST', 
            body: JSON.stringify({ action: 'query', userID: uid, lekerdezettDatum: dateVal }) 
        });
        const res = await resp.json();
        renderReport(res, dateVal);
    } catch(e) { alert("Lekérdezési hiba."); }
}
    
function renderReport(data, dateStr) {
    document.getElementById('res-name').innerText = "Eredmény: " + appData.users[data.userID];
    document.getElementById('res-date-change').value = dateStr;
    const tbody = document.getElementById('result-body');
    tbody.innerHTML = "";

    for(let i = 0; i < PLANETS.length; i++) {
        const base = i * 5;
        const jegy = data.resultMatrix[base];
        const hatasSzoveg = data.resultMatrix[base+1];
        const r = data.resultMatrix[base+2];
        const g = data.resultMatrix[base+3];
        const b = data.resultMatrix[base+4];
        const rgbColor = `rgb(${r},${g},${b})`;

        tbody.innerHTML += `<tr>
            <td>${PLANETS[i]}</td>
            <td>${jegy}</td>
            <td style="background-color: ${rgbColor}; color: ${rgbColor};">${hatasSzoveg}</td>
        </tr>`;
    }
    showView('report-view');
}
    
async function submitRegistration() {
    const name = document.getElementById('reg-name').value;
    if(!name) return alert("Név kitöltése kötelező!");
    
    // Az ACTION, NAME és EMAIL kötelező a Scriptnek
    const body = { 
        action: 'register', 
        name: name, 
        email: document.getElementById('reg-email').value 
    };

    // Itt a kulcsok PONTOSAN megegyeznek a PLANETS tömbbel (pl. "Merkúr")
    PLANETS.forEach((p, i) => {
        const value = document.getElementById("planet-field-" + i).value;
        // A backend v2.3 a kisbetűs változatot várja? 
        // Ha a Scriptben 'adatok.nap' van, akkor p.toLowerCase() kell.
        // Ha a Scriptben 'adatok.Nap' van, akkor p kell.
        // A biztos cél érdekében mindkettőt (vagy a Script szerinti pontosat) küldjük:
        body[p.toLowerCase()] = value; 
    });

    try {
        const resp = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(body) });
        const res = await resp.json();
        if(res.status === "SUCCESS") {
            alert("Sikeres mentés!");
            location.reload(); 
        } else {
            alert("Szerver hiba: " + res.allapotjelzes);
        }
    } catch(e) { alert("Hálózati hiba a mentésnél."); }
}

function showView(id) {
    document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
    window.scrollTo(0,0);
}
</script>
</body>
</html>
