<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AsztroApp</title>
    <link rel="apple-touch-icon" href="asztroApp_ikon_180.png">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { --primary-blue: #00008b; --white: #ffffff; --error-red: #d32f2f; }
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 15px; color: #333; text-align: center; }
        h1, h2 { color: var(--primary-blue); outline: none; }
        .hidden { display: none; }
        .btn-main { background-color: var(--primary-blue); color: var(--white); padding: 12px; border: none; border-radius: 8px; width: 100%; font-size: 16px; margin-top: 10px; cursor: pointer; }
        select, input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; box-sizing: border-box; }
        .hint { font-size: 0.85em; color: #666; margin-top: -5px; margin-bottom: 10px; display: block; text-align: left; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; text-align: left; }
        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
        label { display: block; text-align: left; margin-top: 10px; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border-bottom: 1px solid #ddd; padding: 12px 8px; text-align: left; }
    </style>
</head>
<body>

<div id="app">
    <div id="announcer" class="sr-only" aria-live="assertive"></div>

    <section id="loading-view">
        <h1 tabindex="-1">Betöltés...</h1>
    </section>

    <section id="login-view" class="hidden">
        <img src="asztroApp_ikon_180.png" alt="AsztroApp logó" style="width: 120px; margin: 20px auto; display: block;">
        <h2 tabindex="-1">Bejelentkezés</h2>
        <input type="email" id="login-email" placeholder="E-mail cím" autocomplete="email">
        <input type="password" id="login-password" placeholder="Jelszó">
        <button class="btn-main" onclick="handleAuth()">Indítás</button>
        <p style="font-size: 0.9em; color: #666;">Ha még nincs fiókja, az adatok megadása után a regisztrációhoz ugrunk.</p>
    </section>

    <section id="home-view" class="hidden">
        <div class="nav-bar">
            <h1 tabindex="-1">AsztroApp</h1>
            <div>
                <button onclick="prepareNewChild()" aria-label="Új személy hozzáadása" style="font-size: 24px; background:none; border:none; cursor:pointer;">👤+</button>
                <button onclick="logout()" aria-label="Kijelentkezés" style="font-size: 24px; background:none; border:none; cursor:pointer;">🚪</button>
            </div>
        </div>
        
        <div id="query-form">
            <label for="user-select">Választott személy:</label>
            <select id="user-select"></select>

            <label for="date-select">Lekérdezés dátuma:</label>
            <input type="date" id="date-select">
            <span id="date-range-hint" class="hint"></span>

            <button class="btn-main" onclick="runQuery()">Adatok lekérése</button>
        </div>

        <div id="query-results" class="hidden">
            <h2 id="results-title" tabindex="-1">Eredmények</h2>
            <table>
                <thead>
                    <tr style="border-bottom: 2px solid var(--primary-blue);">
                        <th>Bolygó</th>
                        <th>Jegy</th>
                        <th>Szín/Hatás</th>
                    </tr>
                </thead>
                <tbody id="results-body"></tbody>
            </table>
            <button class="btn-main" style="margin-top:20px; background-color:#666;" onclick="resetQuery()">Új lekérdezés</button>
        </div>
    </section>

    <section id="reg-view" class="hidden">
        <h2 id="reg-title" tabindex="-1">Regisztráció</h2>
        <label for="reg-name">Név (kötelező):</label>
        <input type="text" id="reg-name" placeholder="Példa János" aria-required="true">
        
        <div id="reg-auth-fields">
            <label for="reg-email">E-mail cím:</label>
            <input type="email" id="reg-email" readonly style="background-color: #eee;">
            <label for="reg-pass">Jelszó:</label>
            <input type="password" id="reg-pass" readonly style="background-color: #eee;">
        </div>
        
        <div id="reg-planets"></div>
        <button id="btn-save" class="btn-main" onclick="submitRegistration()">Mentés</button>
        <button class="btn-main" style="background-color:#ccc; color:#000;" onclick="cancelRegistration()">Mégse</button>
    </section>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzzWggy2aybBEsksC8ueMBy8rvA7H1p0dzlt2pYV5VBc_n3zpKtMtqLFHgBFiV5DVRXdA/exec";
const PLANETS_CONFIG = [
    { id: "nap", label: "Nap" }, { id: "asc", label: "ASC" }, { id: "hold", label: "Hold" },
    { id: "merkur", label: "Merkúr" }, { id: "venusz", label: "Vénusz" }, { id: "mars", label: "Mars" }
];
const ZODIACS = ["Kos", "Bika", "Ikrek", "Rák", "Oroszlán", "Szűz", "Mérleg", "Skorpió", "Nyilas", "Bak", "Vízöntő", "Halak"];

let appData = { users: {}, minDate: "", maxDate: "" };
let deviceID = localStorage.getItem('asztro_deviceID') || 'DEV-' + Math.random().toString(36).substr(2, 9).toUpperCase();
localStorage.setItem('asztro_deviceID', deviceID);

function announce(msg) { document.getElementById('announcer').innerText = msg; }
function formatDate(dateStr) { return dateStr ? new Date(dateStr).toISOString().split('T')[0] : ""; }

async function handleAuth() {
    const email = document.getElementById('login-email').value.trim();
    const pass = document.getElementById('login-password').value.trim();
    if(!email || pass.length < 6) return alert("Helytelen adatok!");

    try {
        announce("Ellenőrzés...");
        const resp = await fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'login', email: email, password: pass, deviceID: deviceID })
        });
        const res = await resp.json();

        if (res.status === "SUCCESS") {
            localStorage.setItem('asztro_parentID', res.parentID);
            appData.users = res.users;
            updateHomeUI();
            showView('home-view');
        } else if (res.allapotjelzes === "USER_NOT_FOUND") {
            document.getElementById('reg-email').value = email;
            document.getElementById('reg-pass').value = pass;
            showView('reg-view');
        } else { alert("Hiba: " + res.allapotjelzes); }
    } catch(e) { alert("Hiba a kapcsolódás során."); }
}

async function runQuery() {
    const userId = document.getElementById('user-select').value;
    const date = document.getElementById('date-select').value;
    if(!date) return alert("Válassz dátumot!");

    try {
        announce("Lekérdezés...");
        const resp = await fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({ 
                action: 'query', 
                userID: userId, 
                lekerdezettDatum: date, 
                parentID: localStorage.getItem('asztro_parentID'),
                deviceID: deviceID 
            })
        });
        const res = await resp.json();

        if(res.status === "SUCCESS") {
            const tbody = document.getElementById('results-body');
            tbody.innerHTML = "";
            const m = res.resultMatrix;
            
            for(let i=0; i < m.length; i+=5) {
                const label = PLANETS_CONFIG[i/5].label;
                const rgb = `rgb(${m[i+2]},${m[i+3]},${m[i+4]})`;
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${label}</td><td>${m[i]}</td><td style="background:${rgb};color:${rgb};">${m[i+1]}</td>`;
                tbody.appendChild(tr);
            }
            document.getElementById('query-form').classList.add('hidden');
            document.getElementById('query-results').classList.remove('hidden');
            document.getElementById('results-title').focus();
            announce("Adatok betöltve.");
        } else { alert("Hiba: " + res.status); }
    } catch(e) { alert("Szerver hiba."); }
}

function resetQuery() {
    document.getElementById('query-results').classList.add('hidden');
    document.getElementById('query-form').classList.remove('hidden');
}

function updateHomeUI() {
    const sel = document.getElementById('user-select');
    sel.innerHTML = "";
    for(let id in appData.users) {
        let opt = document.createElement('option');
        opt.value = id; opt.text = appData.users[id];
        sel.appendChild(opt);
    }
    const dInput = document.getElementById('date-select');
    dInput.valueAsDate = new Date();
    if(appData.minDate) {
        dInput.min = formatDate(appData.minDate);
        dInput.max = formatDate(appData.maxDate);
        document.getElementById('date-range-hint').innerText = `Tartomány: ${dInput.min} - ${dInput.max}`;
    }
}

async function loadInitialData() {
    try {
        const resp = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'load' }) });
        const res = await resp.json();
        if (res.status === "SUCCESS") {
            appData.minDate = res.minDate;
            appData.maxDate = res.maxDate;
            showView('login-view');
        }
    } catch (e) { showView('login-view'); }
}

async function checkSession(pID) {
    try {
        const resp = await fetch(SCRIPT_URL, { 
            method: 'POST', 
            body: JSON.stringify({ action: 'checkSession', parentID: pID, deviceID: deviceID }) 
        });
        const res = await resp.json();
        if (res.status === "SESSION_OK") {
            appData.users = res.users;
            updateHomeUI();
            showView('home-view');
        } else { showView('login-view'); }
    } catch(e) { showView('login-view'); }
}

function showView(id) {
    document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
    const target = document.getElementById(id);
    target.classList.remove('hidden');
    if(id === 'reg-view') {
        const isChild = !!localStorage.getItem('asztro_parentID');
        document.getElementById('reg-auth-fields').classList.toggle('hidden', isChild);
        setupNavigation();
    }
    const h = target.querySelector('h1, h2');
    if (h) h.focus();
}

function generateRegFields() {
    const cont = document.getElementById('reg-planets');
    cont.innerHTML = ""; 
    PLANETS_CONFIG.forEach(p => {
        const wrap = document.createElement('div');
        wrap.innerHTML = `<label for="reg-${p.id}">${p.label}:</label>`;
        const sel = document.createElement('select');
        sel.id = "reg-" + p.id;
        ZODIACS.forEach(z => {
            const opt = document.createElement('option');
            opt.value = z; opt.text = z;
            sel.appendChild(opt);
        });
        wrap.appendChild(sel);
        cont.appendChild(wrap);
    });
}

function setupNavigation() {
    const nameField = document.getElementById('reg-name');
    nameField.addEventListener('keydown', (e) => { 
        if(e.key==='Enter'){ e.preventDefault(); document.getElementById("reg-nap").focus(); } 
    });
}

async function logout() {
    if(confirm("Kijelentkezés?")) {
        const pID = localStorage.getItem('asztro_parentID');
        await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'logout', parentID: pID }) });
        localStorage.removeItem('asztro_parentID');
        location.reload();
    }
}

window.onload = async () => {
    generateRegFields();
    const pID = localStorage.getItem('asztro_parentID');
    if (pID) await checkSession(pID); else await loadInitialData();
};
</script>
</body>
</html>
