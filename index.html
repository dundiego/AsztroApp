<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AsztroApp</title>
    <link rel="apple-touch-icon" href="asztroApp_ikon_180.png">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { --primary-blue: #00008b; --white: #ffffff; }
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 15px; color: #333; }
        h1, h2 { color: var(--primary-blue); outline: none; }
        .hidden { display: none; }
        .btn-main { background-color: var(--primary-blue); color: var(--white); padding: 12px; border: none; border-radius: 8px; width: 100%; font-size: 16px; margin-top: 10px; cursor: pointer; }
        select, input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f4f4f4; }
    </style>
</head>
<body>

<div id="app">
    <section id="home-view">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1 tabindex="-1">AsztroApp</h1>
            <button id="btn-to-reg" onclick="showView('reg-view')" aria-label="Új felhasználó hozzáadása" style="font-size: 24px; background:none; border:none;">👤+</button>
        </div>
        
        <label for="user-select">Felhasználó:</label>
        <select id="user-select"></select>

        <label for="date-select">Dátum:</label>
        <input type="date" id="date-select">

        <button class="btn-main" onclick="runQuery()">Küldés</button>
    </section>

    <section id="report-view" class="hidden">
        <h2 id="res-name" tabindex="-1">Eredmény</h2>
        <input type="date" id="res-date-change" aria-label="Dátum módosítása és új lekérdezés">
        
        <table id="result-table" aria-label="Asztrológiai jelentés">
            <thead>
                <tr>
                    <th scope="col">Bolygó</th>
                    <th scope="col">Jegy</th>
                    <th scope="col">Hatás</th>
                </tr>
            </thead>
            <tbody id="result-body"></tbody>
        </table>
        <button class="btn-main" style="margin-top:20px;" onclick="showView('home-view')">Vissza</button>
    </section>

    <section id="reg-view" class="hidden">
        <h2 tabindex="-1">Regisztráció</h2>
        <input type="text" id="reg-name" placeholder="Név (kötelező)" aria-required="true">
        <input type="email" id="reg-email" placeholder="E-mail (nem kötelező)">
        
        <div id="reg-planets"></div>
        <button class="btn-main" onclick="submitRegistration()">Mentés</button>
        <button class="btn-main" style="background-color:#ccc; color:#000;" onclick="showView('home-view')">Mégse</button>
    </section>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwJhEEv7KfPryqCOzmxw7ySdZbBkZIAgTQWRRI0zA9vvTUkYXBKCJ8SfOoPxKtczisuhA/exec";
    
const PLANETS_CONFIG = [
    { id: "nap", label: "Nap" },
    { id: "asc", label: "ASC" },
    { id: "hold", label: "Hold" },
    { id: "merkur", label: "Merkúr" },
    { id: "venusz", label: "Vénusz" },
    { id: "mars", label: "Mars" }
];
const ZODIACS = ["Kos", "Bika", "Ikrek", "Rák", "Oroszlán", "Szűz", "Mérleg", "Skorpió", "Nyilas", "Bak", "Vízöntő", "Halak"];

let appData = { users: {}, minDate: "", maxDate: "", actualUser: "" };

window.onload = async () => {
    generateRegFields();
    setupNavigation(); 
    document.getElementById('date-select').valueAsDate = new Date();

    await loadInitialData();
    
    document.getElementById('res-date-change').addEventListener('change', function() {
        if(confirm("Szeretne új lekérdezést a módosított dátummal?")) {
            document.getElementById('date-select').value = this.value;
            runQuery();
        }
    });
};

function setupNavigation() {
    const nameInput = document.getElementById('reg-name');
    const emailInput = document.getElementById('reg-email');

    nameInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            emailInput.focus();
        }
    });

    emailInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            emailInput.blur(); 
            const firstSelect = document.getElementById('reg-nap');
            if (firstSelect) firstSelect.focus();
        }
    });
}

function generateRegFields() {
    const cont = document.getElementById('reg-planets');
    cont.innerHTML = ""; 
    PLANETS_CONFIG.forEach(p => {
        const label = document.createElement('label');
        label.setAttribute('for', "reg-" + p.id);
        label.innerText = p.label + ":";
        
        const sel = document.createElement('select');
        sel.id = "reg-" + p.id;
        
        ZODIACS.forEach(z => {
            const opt = document.createElement('option');
            opt.value = z;
            opt.text = z;
            sel.appendChild(opt);
        });
        cont.appendChild(label);
        cont.appendChild(sel);
        cont.appendChild(document.createElement('br'));
    });
}

async function loadInitialData() {
    try {
        const resp = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'load' }) });
        const res = await resp.json();
        if(res.status === "SUCCESS") {
            appData = res;
            updateHomeUI();
            if(!res.hasUsers) showView('reg-view');
        }
    } catch(e) { console.error("Hiba:", e); }
}

function updateHomeUI() {
    const sel = document.getElementById('user-select');
    sel.innerHTML = "";
    for(let id in appData.users) {
        let opt = document.createElement('option');
        opt.value = id;
        opt.text = appData.users[id];
        if(id === appData.defaultUserID) opt.selected = true;
        sel.appendChild(opt);
    }
    const d = document.getElementById('date-select');
    d.min = appData.minDate;
    d.max = appData.maxDate;
}

async function runQuery() {
    const uid = document.getElementById('user-select').value;
    const dateVal = document.getElementById('date-select').value;
    if(!uid || !dateVal) return alert("Válassz felhasználót és dátumot!");

    const dateObj = new Date(dateVal);
    dateObj.setHours(0, 0, 0, 0);
    const finalDate = dateObj.toISOString(); 

    try {
        const resp = await fetch(SCRIPT_URL, { 
            method: 'POST', 
            body: JSON.stringify({ action: 'query', userID: uid, lekerdezettDatum: finalDate }) 
        });
        const res = await resp.json();
        renderReport(res, dateVal);
    } catch(e) { alert("Lekérdezési hiba."); }
}

function renderReport(data, dateStr) {
    document.getElementById('res-name').innerText = "Eredmény: " + (appData.users[data.userID] || "Ismeretlen");
    document.getElementById('res-date-change').value = dateStr;
    
    const tbody = document.getElementById('result-body');
    tbody.innerHTML = "";

    for(let i = 0; i < PLANETS_CONFIG.length; i++) {
        const base = i * 5;
        const jegy = data.resultMatrix[base];
        const hatasSzoveg = data.resultMatrix[base+1];
        const r = data.resultMatrix[base+2];
        const g = data.resultMatrix[base+3];
        const b = data.resultMatrix[base+4];
        const rgbColor = `rgb(${r},${g},${b})`;

        // Visszaállítva a "szín a színben" megoldás a VoiceOver miatt
        const row = `<tr>
            <th scope="row">${PLANETS_CONFIG[i].label}</th>
            <td>${jegy}</td>
            <td style="background-color: ${rgbColor}; color: ${rgbColor}; border: 1px solid #999;">
                ${hatasSzoveg}
            </td>
        </tr>`;
        tbody.innerHTML += row;
    }
    
    showView('report-view');
    setTimeout(() => { document.getElementById('res-name').focus(); }, 300);
}

async function submitRegistration() {
    const name = document.getElementById('reg-name').value;
    if(!name) return alert("Név kitöltése kötelező!");
    
    const body = { action: 'register', name: name, email: document.getElementById('reg-email').value };
    PLANETS_CONFIG.forEach(p => { body[p.id] = document.getElementById("reg-" + p.id).value; });

    try {
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(body) });
        alert("Sikeres mentés!");
        location.reload(); 
    } catch(e) { alert("Hiba a mentésnél."); }
}

function showView(id) {
    document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
    const target = document.getElementById(id);
    target.classList.remove('hidden');
    const header = target.querySelector('h1, h2');
    if (header) header.focus();
    window.scrollTo(0,0);
}
</script>
</body>
</html>
