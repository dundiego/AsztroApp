<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AsztroApp</title>
    <link rel="apple-touch-icon" href="asztroApp_ikon_180.png">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { --primary-blue: #00008b; --white: #ffffff; --error-red: #d32f2f; }
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 15px; color: #333; }
        h1, h2 { color: var(--primary-blue); outline: none; }
        .hidden { display: none; }
        .btn-main { background-color: var(--primary-blue); color: var(--white); padding: 12px; border: none; border-radius: 8px; width: 100%; font-size: 16px; margin-top: 10px; cursor: pointer; }
        select, input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        .hint { font-size: 0.85em; color: #666; margin-top: -5px; margin-bottom: 10px; display: block; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; }
        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
    </style>
</head>
<body>

<div id="app">
    <div id="announcer" class="sr-only" aria-live="assertive"></div>

    <section id="loading-view">
        <h1 tabindex="-1">Betöltés...</h1>
    </section>

    <section id="login-view" class="hidden">
        <h2 tabindex="-1">Bejelentkezés</h2>
        <input type="email" id="login-email" placeholder="E-mail cím" autocomplete="email">
        <input type="password" id="login-password" placeholder="Jelszó">
        <button class="btn-main" onclick="handleLogin()">Belépés</button>
        <button class="btn-main" style="background-color:#eee; color:#333;" onclick="showView('reg-view')">Új felhasználó regisztrációja</button>
    </section>

    <section id="home-view" class="hidden">
        <div class="nav-bar">
            <h1 tabindex="-1">AsztroApp</h1>
            <div>
                <button onclick="showView('reg-view')" aria-label="Új személy hozzáadása" style="font-size: 24px; background:none; border:none;">👤+</button>
                <button onclick="logout()" aria-label="Kijelentkezés" style="font-size: 24px; background:none; border:none;">🚪</button>
            </div>
        </div>
        
        <label for="user-select">Választott személy:</label>
        <select id="user-select"></select>

        <label for="date-select">Lekérdezés dátuma:</label>
        <input type="date" id="date-select">

        <button class="btn-main" onclick="runQuery()">Adatok lekérése</button>
    </section>

    <section id="reg-view" class="hidden">
        <h2 id="reg-title" tabindex="-1">Regisztráció</h2>
        
        <label for="reg-name">Név (kötelező):</label>
        <input type="text" id="reg-name" placeholder="Példa János" aria-required="true">
        
        <div class="parent-only">
            <label for="reg-email">E-mail cím:</label>
            <input type="email" id="reg-email" placeholder="email@pelda.hu" aria-describedby="email-hint">
            <small id="email-hint" class="hint">Valós e-mail cím szükséges (pl. név@domain.hu).</small>

            <label for="reg-pass">Jelszó:</label>
            <input type="password" id="reg-pass" placeholder="Jelszó" aria-describedby="pass-hint">
            <small id="pass-hint" class="hint">8-16 karakter, kis- és nagybetű, valamint szám kötelező.</small>
        </div>
        
        <div id="reg-planets"></div>
        
        <button id="btn-save" class="btn-main" onclick="submitRegistration()">Mentés</button>
        <button class="btn-main" style="background-color:#ccc; color:#000;" onclick="cancelRegistration()">Mégse</button>
    </section>
</div>

<script>
const SCRIPT_URL ="https://script.google.com/macros/s/AKfycbxJNi7tUFj-iVRD7IG8__XBN7osbkjoOl3HiQXPcMcX0nHNJ_MADnvTC_XhYNzEHWfBCg/exec"
const PLANETS_CONFIG = [
    { id: "nap", label: "Nap" }, { id: "asc", label: "ASC" }, { id: "hold", label: "Hold" },
    { id: "merkur", label: "Merkúr" }, { id: "venusz", label: "Vénusz" }, { id: "mars", label: "Mars" }
];
const ZODIACS = ["Kos", "Bika", "Ikrek", "Rák", "Oroszlán", "Szűz", "Mérleg", "Skorpió", "Nyilas", "Bak", "Vízöntő", "Halak"];

let appData = { users: {}, minDate: "", maxDate: "" };
let deviceID = localStorage.getItem('asztro_deviceID') || 'DEV-' + Math.random().toString(36).substr(2, 9).toUpperCase();
localStorage.setItem('asztro_deviceID', deviceID);

// Segéd: VoiceOver üzenetküldés
function announce(msg) { document.getElementById('announcer').innerText = msg; }

// Validációs szabályok
function validateEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

function validatePassword(pass) {
    // 8-16 karakter, kisbetű, nagybetű, szám
    return /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,16}$/.test(pass);
}

async function submitRegistration() {
    const name = document.getElementById('reg-name').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const pass = document.getElementById('reg-pass').value.trim();
    const parentID = localStorage.getItem('asztro_parentID');

    if(!name) { announce("A név megadása kötelező!"); return alert("Név kötelező!"); }

    // Csak új főfelhasználó (parent) esetén kötelező az email/pass
    if(!parentID) {
        if(!validateEmail(email)) { announce("Érvénytelen e-mail cím formátum!"); return alert("Hibás email!"); }
        if(!validatePassword(pass)) { announce("A jelszó nem felel meg a biztonsági követelményeknek!"); return alert("Gyenge jelszó!"); }
    }

    const body = { 
        action: 'register', 
        name: name, email: email, password: pass,
        parentID: parentID || "", 
        deviceID: deviceID 
    };
    PLANETS_CONFIG.forEach(p => { body[p.id] = document.getElementById("reg-" + p.id).value; });

    try {
        const resp = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(body) });
        const res = await resp.json();
        if(res.status === "SUCCESS") {
            announce("Sikeres regisztráció.");
            if(!parentID) localStorage.setItem('asztro_parentID', res.userID);
            location.reload();
        }
    } catch(e) { announce("Hiba a mentés során."); }
}

function setupNavigation() {
    const nameField = document.getElementById('reg-name');
    const emailField = document.getElementById('reg-email');
    const passField = document.getElementById('reg-pass');
    const saveBtn = document.getElementById('btn-save');

    // Enter gomb kezelése mezőről mezőre
    nameField.addEventListener('keydown', (e) => { if(e.key==='Enter'){ e.preventDefault(); emailField.focus(); } });
    
    emailField.addEventListener('keydown', (e) => { 
        if(e.key==='Enter'){ 
            e.preventDefault(); 
            if(localStorage.getItem('asztro_parentID')) {
                document.getElementById("reg-nap").focus(); // Ha gyerek, ugrik a listára
            } else {
                passField.focus(); 
            }
        } 
    });

    passField.addEventListener('keydown', (e) => { 
        if(e.key==='Enter'){ e.preventDefault(); document.getElementById("reg-nap").focus(); } 
    });

    // Az utolsó bolygó választó után a Mentés gombra ugrik
    const lastPlanet = "reg-" + PLANETS_CONFIG[PLANETS_CONFIG.length - 1].id;
    document.getElementById(lastPlanet).addEventListener('change', () => {
        setTimeout(() => saveBtn.focus(), 100);
    });
}

async function logout() {
    if(confirm("Biztosan kijelentkezik?")) {
        const pID = localStorage.getItem('asztro_parentID');
        // Értesítjük a backendet is, hogy törölje a deviceID-t
        await fetch(SCRIPT_URL, { 
            method: 'POST', 
            body: JSON.stringify({ action: 'logout', parentID: pID }) 
        });
        localStorage.removeItem('asztro_parentID');
        location.reload();
    }
}

// ... (A többi betöltő függvény változatlan marad, de a showView-t frissítjük)

function showView(id) {
    document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
    const target = document.getElementById(id);
    target.classList.remove('hidden');
    
    if(id === 'reg-view') {
        const isChild = !!localStorage.getItem('asztro_parentID');
        document.getElementById('reg-title').innerText = isChild ? "Új személy hozzáadása" : "Regisztráció";
        document.querySelectorAll('.parent-only').forEach(el => el.style.display = isChild ? 'none' : 'block');
        setupNavigation();
    }
    
    const header = target.querySelector('h1, h2');
    if (header) header.focus();
}

function generateRegFields() {
    const cont = document.getElementById('reg-planets');
    cont.innerHTML = ""; 
    PLANETS_CONFIG.forEach(p => {
        const wrap = document.createElement('div');
        wrap.innerHTML = `<label for="reg-${p.id}">${p.label}:</label>`;
        const sel = document.createElement('select');
        sel.id = "reg-" + p.id;
        ZODIACS.forEach(z => {
            const opt = document.createElement('option');
            opt.value = z; opt.text = z;
            sel.appendChild(opt);
        });
        wrap.appendChild(sel);
        cont.appendChild(wrap);
    });
}
// Alapértelmezett hívások
window.onload = () => { generateRegFields(); showView('loading-view'); /* ... többi init kód ... */ };
</script>
</body>
</html>
