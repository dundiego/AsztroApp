<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AsztroApp</title>
    <style>
        :root { --primary-blue: #00008b; --white: #ffffff; --vissza-bg: rgb(252, 224, 98); }
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 15px; color: #333; text-align: center; }
        .hidden { display: none; }
        .btn-main { background-color: var(--primary-blue); color: var(--white); padding: 12px; border: none; border-radius: 8px; width: 100%; font-size: 16px; margin-top: 10px; cursor: pointer; }
        .btn-vissza { background-color: var(--vissza-bg); color: black; padding: 12px; border: none; border-radius: 8px; width: 100%; font-size: 16px; margin-top: 10px; cursor: pointer; }
        select, input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; }
        .menu-container { position: relative; display: inline-block; }
        .menu-content { display: none; position: absolute; right: 0; background-color: #f9f9f9; min-width: 160px; box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2); z-index: 100; border-radius: 8px; }
        .menu-content button { color: black; padding: 12px 16px; text-decoration: none; display: block; border: none; width: 100%; text-align: left; background: none; cursor: pointer; border-bottom: 1px solid #ddd; }
        .show { display: block; }
        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border-bottom: 1px solid #ddd; padding: 12px 8px; text-align: left; }
    </style>
</head>
<body>

<div id="app">
    <div id="announcer" class="sr-only" aria-live="assertive"></div>

    <section id="loading-view">
        <h1 tabindex="-1">Betöltés...</h1>
    </section>

    <section id="login-view" class="hidden">
        <h2 tabindex="-1">Bejelentkezés</h2>
        <input type="email" id="login-email" placeholder="E-mail cím">
        <input type="password" id="login-password" placeholder="Jelszó">
        <button class="btn-main" onclick="handleAuth()">Indítás</button>
    </section>

    <section id="home-view" class="hidden">
        <div class="nav-bar">
            <h1 id="home-title" tabindex="-1">Aktuális hatások</h1>
            <div class="menu-container">
                <button onclick="toggleMenu()" aria-label="Profilkezelő menü" style="font-size: 24px; background:none; border:none; cursor:pointer;">👤⚙️</button>
                <div id="profile-menu" class="menu-content">
                    <button onclick="prepareNewChild()">Új személy hozzáadása</button>
                    <button onclick="editCurrentProfile()">Módosítás</button>
                    <button onclick="deleteProfile()" style="color: red;">Törlés</button>
                    <button onclick="logout()">Kijelentkezés</button>
                </div>
            </div>
        </div>
        
        <div id="selection-panel">
            <label for="user-select">Választott személy:</label>
            <div style="display: flex; gap: 5px;">
                <select id="user-select" style="flex-grow: 1;" onchange="handleUserChange()"></select>
                <button onclick="editNamePrompt()" aria-label="Név szerkesztése" style="padding: 10px;">✏️</button>
            </div>

            <label for="date-select">Lekérdezés dátuma:</label>
            <input type="date" id="date-select" onchange="handleDateChange()">
            <button id="btn-run-query" class="btn-main" onclick="runQuery()">Indítás</button>
        </div>

        <div id="query-results" class="hidden">
            <table>
                <thead>
                    <tr>
                        <th id="first-cell" tabindex="-1">Bolygó és Jegy</th>
                        <th>Hatás</th>
                    </tr>
                </thead>
                <tbody id="results-body"></tbody>
            </table>
        </div>
    </section>

    <section id="reg-view" class="hidden">
        <h2 id="reg-title" tabindex="-1">Személy adatlapja</h2>
        <label for="reg-name">Név:</label>
        <input type="text" id="reg-name" placeholder="Példa János">
        
        <div id="reg-auth-fields" class="hidden">
            <input type="email" id="reg-email" readonly style="background-color: #eee;">
            <input type="password" id="reg-pass" readonly style="background-color: #eee;">
        </div>
        
        <div id="reg-planets"></div>
        
        <button id="btn-save" class="btn-main" onclick="submitRegistration()">Mentés</button>
        <button class="btn-vissza" onclick="cancelRegistration()">Mégsem</button>
    </section>

    <section id="delete-view" class="hidden">
        <h2 id="delete-title" tabindex="-1">Profilkezelés - Törlés</h2>
        <label for="delete-user-select">Törlendő személy kiválasztása:</label>
        <select id="delete-user-select"></select>

        <button class="btn-main" onclick="confirmDelete()">Törlés</button>
        <button class="btn-vissza" onclick="cancelRegistration()">Vissza</button>
    </section>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz8X-dS12AxUdcGvav27aOS4vNKBvnsnmmBp9HGWIIwY9Y7YfEIWSU4zEEaybDcDU4_yg/exec";
const PLANETS_CONFIG = [{id:"nap", label:"Nap"}, {id:"asc", label:"ASC"}, {id:"hold", label:"Hold"}, {id:"merkur", label:"Merkúr"}, {id:"venusz", label:"Vénusz"}, {id:"mars", label:"Mars"}];
const ZODIACS = ["Kos", "Bika", "Ikrek", "Rák", "Oroszlán", "Szűz", "Mérleg", "Skorpió", "Nyilas", "Bak", "Vízöntő", "Halak"];

let appData = { users: {}, currentEditID: null, minDate: "", maxDate: "" };
let deviceID = localStorage.getItem('asztro_deviceID') || 'DEV-' + Math.random().toString(36).substr(2, 9).toUpperCase();
localStorage.setItem('asztro_deviceID', deviceID);

function announce(msg) { document.getElementById('announcer').innerText = msg; }

function showView(id) {
    document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
    const target = document.getElementById(id);
    target.classList.remove('hidden');
    const h = target.querySelector('h1, h2');
    if (h) h.focus();
    document.getElementById("profile-menu").classList.remove("show");
}

async function handleAuth() {
    const email = document.getElementById('login-email').value.trim();
    const pass = document.getElementById('login-password').value.trim();
    if(!email || !pass) return alert("Kérlek töltsd ki az adatokat!");
    try {
        announce("Bejelentkezés...");
        const resp = await fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'login', email: email, password: pass, deviceID: deviceID })
        });
        const res = await resp.json();
        if (res.status === "SUCCESS") {
            localStorage.setItem('asztro_parentID', res.parentID);
            appData.users = res.users;
            updateHomeUI();
            showView('home-view');
        } else if (res.allapotjelzes === "USER_NOT_FOUND") {
            document.getElementById('reg-email').value = email;
            document.getElementById('reg-pass').value = pass;
            showView('reg-view');
        } else { alert("Hiba: " + res.allapotjelzes); }
    } catch(e) { alert("Hiba a kapcsolódás során."); }
}

async function runQuery() {
    const userId = document.getElementById('user-select').value;
    const date = document.getElementById('date-select').value;
    if(!date) return alert("Válassz dátumot!");
    try {
        announce("Lekérdezés...");
        const resp = await fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'query', userID: userId, lekerdezettDatum: date, parentID: localStorage.getItem('asztro_parentID'), deviceID: deviceID })
        });
        const res = await resp.json();
        if(res.status === "SUCCESS") {
            const tbody = document.getElementById('results-body');
            tbody.innerHTML = "";
            const m = res.resultMatrix;
            for(let i=0; i < m.length; i+=5) {
                const tr = document.createElement('tr');
                const rgb = `rgb(${m[i+2]},${m[i+3]},${m[i+4]})`;
                tr.innerHTML = `<td><strong>${PLANETS_CONFIG[i/5].label}:</strong> ${m[i]}</td><td style="background:${rgb};color:${rgb};border:1px solid #ccc;">${m[i+1]}</td>`;
                tbody.appendChild(tr);
            }
            document.getElementById('query-results').classList.remove('hidden');
            setTimeout(() => { document.getElementById('first-cell').focus(); }, 100);
        }
    } catch(e) { alert("Szerver hiba."); }
}

async function loadInitialData() {
    try {
        const resp = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'load' }) });
        const res = await resp.json();
        if (res.status === "SUCCESS") {
            appData.minDate = res.minDate;
            appData.maxDate = res.maxDate;
            showView('login-view');
        }
    } catch (e) { showView('login-view'); }
}

async function checkSession(pID) {
    try {
        const resp = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'checkSession', parentID: pID, deviceID: deviceID }) });
        const res = await resp.json();
        if (res.status === "SESSION_OK") {
            appData.users = res.users;
            updateHomeUI();
            showView('home-view');
        } else { showView('login-view'); }
    } catch(e) { showView('login-view'); }
}

function updateHomeUI() {
    const sel = document.getElementById('user-select');
    sel.innerHTML = "";
    for(let id in appData.users) {
        let opt = document.createElement('option');
        opt.value = id; opt.text = appData.users[id];
        sel.appendChild(opt);
    }
    const dInput = document.getElementById('date-select');
    dInput.valueAsDate = new Date();
}

function handleUserChange() { document.getElementById('date-select').focus(); }
function handleDateChange() { document.getElementById('btn-run-query').focus(); }
function toggleMenu() { document.getElementById("profile-menu").classList.toggle("show"); }
function cancelRegistration() { showView('home-view'); }

function prepareNewChild() {
    appData.currentEditID = null;
    document.getElementById('reg-title').innerText = "Új személy hozzáadása";
    document.getElementById('reg-name').value = "";
    showView('reg-view');
}

function editCurrentProfile() {
    const userID = document.getElementById('user-select').value;
    appData.currentEditID = userID;
    document.getElementById('reg-title').innerText = "Profil módosítása";
    document.getElementById('reg-name').value = document.getElementById('user-select').options[document.getElementById('user-select').selectedIndex].text;
    showView('reg-view');
}

function openDeleteView() {
    const mainSelect = document.getElementById('user-select');
    const deleteSelect = document.getElementById('delete-user-select');
    deleteSelect.innerHTML = mainSelect.innerHTML;
    deleteSelect.value = mainSelect.value;
    showView('delete-view');
}

function deleteProfile() { openDeleteView(); }

async function logout() {
    const pID = localStorage.getItem('asztro_parentID');
    await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'logout', parentID: pID }) });
    localStorage.removeItem('asztro_parentID');
    location.reload();
}

function generateRegFields() {
    const cont = document.getElementById('reg-planets');
    cont.innerHTML = "";
    PLANETS_CONFIG.forEach((p, index) => {
        const wrap = document.createElement('div');
        wrap.innerHTML = `<label for="reg-${p.id}">${p.label}:</label>`;
        const sel = document.createElement('select');
        sel.id = "reg-" + p.id;
        ZODIACS.forEach(z => {
            const opt = document.createElement('option');
            opt.value = z; opt.text = z;
            sel.appendChild(opt);
        });
        sel.onchange = () => {
            const nextIdx = index + 1;
            if (nextIdx < PLANETS_CONFIG.length) { document.getElementById("reg-" + PLANETS_CONFIG[nextIdx].id).focus(); }
            else { document.getElementById("btn-save").focus(); }
        };
        wrap.appendChild(sel);
        cont.appendChild(wrap);
    });
}

window.onload = async () => {
    generateRegFields();
    const pID = localStorage.getItem('asztro_parentID');
    if (pID) await checkSession(pID); 
    else await loadInitialData();
};
</script>
</body>
</html>
